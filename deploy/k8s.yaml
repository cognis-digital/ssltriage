apiVersion: apps/v1
kind: Deployment
metadata: { name: ssltriage, labels: { app: ssltriage } }
spec:
  replicas: 1
  selector: { matchLabels: { app: ssltriage } }
  template:
    metadata: { labels: { app: ssltriage } }
    spec:
      containers:
        - name: ssltriage
          image: ghcr.io/cognis-digital/ssltriage:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: ssltriage }
spec:
  selector: { app: ssltriage }
  ports: [{ port: 80, targetPort: 8000 }]
